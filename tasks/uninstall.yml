---
- name: Check existence of Redmine systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ redmine_identifier }}.service"
  register: redmine_service_stat

- name: Uninstall redmine systemd services and files
  when: redmine_service_stat.stat.exists | bool
  block:
    - name: Ensure Redmine systemd units are stopped
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: false
        daemon_reload: true
      with_items:
        - "{{ redmine_identifier }}.service"
        - "{{ redmine_identifier }}-send-reminders.service"
        - "{{ redmine_identifier }}-send-reminders.timer"

    - name: Ensure Redmine recurring tasks systemd units are stopped
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: false
        daemon_reload: true
      when: redmine_recurring_tasks_enabled | bool
      with_items:
        - "{{ redmine_identifier }}-recurring-tasks.service"
        - "{{ redmine_identifier }}-recurring-tasks.timer"

    - name: Ensure Redmine systemd units do not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ item }}"
        state: absent
      with_items:
        - "{{ redmine_identifier }}.service"
        - "{{ redmine_identifier }}-send-reminders.service"
        - "{{ redmine_identifier }}-send-reminders.timer"
        - "{{ redmine_identifier }}-recurring-tasks.service"
        - "{{ redmine_identifier }}-recurring-tasks.timer"

    - name: Ensure Redmine support files do not exist
      ansible.builtin.file:
        path: "{{ redmine_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Redmine local config path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ redmine_config_path }}"
      register: redmine_config_path_deletion_result
      changed_when: redmine_config_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Redmine local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ redmine_data_path }}"
      register: redmine_data_path_deletion_result
      changed_when: redmine_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Redmine base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ redmine_base_path }}"
      register: redmine_base_path_deletion_result
      changed_when: redmine_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Redmine container network does not exist
      when: redmine_container_network_deletion_enabled
      block:
        - name: Ensure Redmine container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ redmine_container_network }}"
            state: absent
          register: redmine_network_deletion_result

        - name: Ensure Redmine container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ redmine_container_network }}
          register: redmine_network_deletion_result
          changed_when: redmine_container_network in redmine_network_deletion_result.stdout

- name: Check existence of Redmine local data path
  ansible.builtin.stat:
    path: "{{ redmine_config_path }}"
  register: redmine_config_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Notify if Redmine local config data remains
  when: redmine_config_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Redmine instance has been removed, some old config data remains in `" + redmine_config_path + "`. Feel free to delete it."
        ]
      }}

- name: Check existence of Redmine local data path
  ansible.builtin.stat:
    path: "{{ redmine_data_path }}"
  register: redmine_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Notify if Redmine local data remains
  when: redmine_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Redmine instance has been removed, some old data remains in `" + redmine_data_path + "`. Feel free to delete it."
        ]
      }}
